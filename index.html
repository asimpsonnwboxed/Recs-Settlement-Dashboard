                                        <div className="p-4 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center text-slate-900 text-slate-900">
                                            <span className="font-black uppercase text-[11px] tracking-tight">{acc.account}</span>
                                            <div className="p-1.5 bg-blue-100 rounded-lg group-hover:bg-[#002d72] transition-colors group-hover:text-white text-blue-900 text-blue-900 text-blue-900">
                                                <Icon name="landmark" size={14} />
                                            </div>
                                        </div>
                                        <div className="p-5 space-y-6 flex-1 text-slate-800 text-slate-800">
                                            <div className="grid grid-cols-2 gap-4 text-slate-800 text-slate-800">
                                                <div className="space-y-1 text-slate-800 text-slate-800 text-slate-800 text-slate-800">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400">Weekly Total In (Credit)</p>
                                                    <p className="text-[13px] font-black text-emerald-600 tabular-nums">{formatCurrency(acc.in)}</p>
                                                </div>
                                                <div className="space-y-1 text-right text-slate-800 text-slate-800 text-slate-800 text-slate-800">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400">Weekly Total Out (Debit)</p>
                                                    <p className="text-[13px] font-black text-rose-600 tabular-nums text-rose-600 text-rose-600">{formatCurrency(acc.out)}</p>
                                                </div>
                                            </div>
                                            <div className="pt-4 border-t border-slate-50 flex flex-col gap-1.5 text-slate-800 text-slate-800">
                                                <div className="flex items-center justify-between text-slate-800 text-slate-800 text-slate-800">
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase text-slate-400 text-slate-400 text-slate-400">Final Net Balance</span>
                                                    <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase ${acc.net < 0 ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                        {acc.net < 0 ? 'Debit Position' : 'Credit Position'}
                                                    </span>
                                                </div>
                                                <p className={`text-xl font-black tabular-nums ${acc.net < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>
                                                    {formatCurrency(acc.net)}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RECONCILIATION BREAK TRACKING SECTION */}
                        <div className="space-y-4 w-full mt-6 text-slate-800">
                            <div className="flex items-center justify-between border-b-2 border-blue-900 pb-3 text-[#002d72] text-[#002d72]">
                                <h3 className="text-lg font-black flex items-center gap-2 uppercase tracking-wider text-[#002d72] text-[#002d72]">
                                    <Icon name="clipboard-list" color="#002d72" size={20} /> Reconciliation Breaks Tracking
                                </h3>
                                <div className="bg-blue-50 text-[#002d72] px-4 py-1 rounded-full border border-blue-200 flex items-center gap-2 shadow-sm text-[#002d72] text-[#002d72] text-[#002d72]">
                                    <Icon name="check-circle" color="#002d72" size={14} />
                                    <span className="text-[10px] font-black uppercase tracking-widest text-[#002d72]">75% Resolution Rate</span>
                                </div>
                            </div>
                            <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                                <table className="w-full text-left text-xs">
                                    <thead>
                                        <tr className="bg-slate-50 border-b border-slate-100 text-slate-400">
                                            <th className="p-4 font-black uppercase tracking-widest text-[9px] text-slate-400">Date / Ticket</th>
                                            <th className="p-4 font-black uppercase tracking-widest text-[9px] text-slate-400">Scheme</th>
                                            <th className="p-4 font-black uppercase tracking-widest text-[9px] text-slate-400">Amount</th>
                                            <th className="p-4 font-black uppercase tracking-widest text-[9px] text-slate-400 text-slate-400">Summary & Status</th>
                                            <th className="p-4 font-black uppercase tracking-widest text-[9px] text-slate-400">Resolution / Progress</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {recBreaks.map((brk, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="p-4">
                                                    <p className="font-black text-slate-900">{brk.ticket}</p>
                                                    <p className="text-[9px] text-slate-400 font-bold">{brk.date}</p>
                                                </td>
                                                <td className="p-4">
                                                    <span className="px-2 py-0.5 bg-blue-100 text-[#002d72] rounded text-[9px] font-black uppercase tracking-tighter">
                                                        {brk.client} {brk.scheme}
                                                    </span>
                                                </td>
                                                <td className="p-4 font-black tabular-nums text-slate-700">
                                                    {formatCurrency(brk.amount)}
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`h-1.5 w-1.5 rounded-full ${brk.status === 'Closed' ? 'bg-emerald-500' : 'bg-amber-500 animate-pulse'}`}></span>
                                                        <span className={`font-black uppercase text-[9px] ${brk.status === 'Closed' ? 'text-emerald-600' : 'text-amber-600'} text-amber-600`}>{brk.status}</span>
                                                    </div>
                                                    <p className="text-[10px] text-slate-500 leading-relaxed max-w-xs">{brk.summary}</p>
                                                </td>
                                                <td className="p-4">
                                                    <div className="bg-slate-100/50 p-2 rounded-lg border border-slate-200/50">
                                                        <p className="text-[10px] font-bold text-slate-600 italic">"{brk.progress}"</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* DYNAMIC NSC HUB */}
                        <div className="space-y-6 w-full mt-6 text-slate-800 text-slate-800 text-slate-800">
                            <div className="flex items-center justify-between border-b-2 border-blue-900 pb-3 text-[#002d72] text-[#002d72] text-[#002d72]">
                                <h3 className="text-lg font-black flex items-center gap-2 uppercase tracking-wider text-[#002d72] text-[#002d72] text-[#002d72]">
                                    <Icon name="activity" color="#002d72" size={20} /> Net Sender Cap (NSC) - Daily Liquidity Hub
                                </h3>
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-50 text-[#002d72] px-4 py-1.5 rounded-full border border-blue-200 flex items-center gap-2 shadow-sm text-[#002d72] text-[#002d72] text-[#002d72]">
                                        <Icon name="shield" color="#002d72" size={14} />
                                        <span className="text-[10px] font-black uppercase tracking-widest text-[#002d72]">Current Net Sender Cap: £75,000,000</span>
                                    </div>
                                    <div className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full border border-blue-200 flex items-center gap-1.5 shadow-sm text-blue-700 text-blue-700 text-blue-700">
                                        <Icon name="zap" color="#3b82f6" size={12} />
                                        <span className="text-[9px] font-black uppercase tracking-widest text-blue-700 text-blue-700">Interactive Tracking</span>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 text-slate-800">
                                {/* Selector */}
                                <div className="lg:col-span-4 flex flex-col gap-4 text-slate-800">
                                    <div className="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm text-slate-800 text-slate-800">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Select Daily Cycle Performance</p>
                                        <div className="space-y-2 text-slate-800 text-slate-800">
                                            {nscDailyBreakdown.map((dayData, idx) => (
                                                <button 
                                                    key={idx}
                                                    onClick={() => setSelectedDayIdx(idx)}
                                                    className={`w-full p-4 rounded-2xl border text-left transition-all flex justify-between items-center group ${selectedDayIdx === idx ? 'nsc-tab-active shadow-md shadow-blue-900/20' : 'bg-slate-50 border-slate-200 hover:border-blue-300 text-slate-600'}`}
                                                >
                                                    <div>
                                                        <p className="text-[11px] font-black uppercase tracking-tight">{dayData.day}</p>
                                                        <p className={`text-[10px] font-bold ${selectedDayIdx === idx ? 'text-blue-200' : 'text-slate-400'}`}>Total Settled: {formatCurrency(dayData.total)}</p>
                                                    </div>
                                                    <Icon name="chevron-right" size={16} className={selectedDayIdx === idx ? 'text-white' : 'text-slate-300'} />
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Cap Metric Box */}
                                    <div className="bg-[#002d72] text-white p-6 rounded-3xl shadow-lg border border-blue-900 flex-1 flex flex-col justify-center text-white text-white text-white">
                                        <div className="flex items-center gap-3 mb-4 text-white text-white">
                                            <div className="p-2 bg-emerald-500/20 rounded-xl text-emerald-400 text-white">
                                                <Icon name="shield-check" size={24} />
                                            </div>
                                            <h4 className="text-sm font-black uppercase tracking-tight text-white">Cap Monitoring</h4>
                                        </div>
                                        <div className="space-y-4 text-white text-white">
                                            <p className="text-xs text-blue-100 font-medium leading-relaxed text-white">
                                                Total Daily Settlement for {activeDay.day.split(' ')[0]} was <span className="font-black text-white">{formatCurrency(activeDay.total)}</span>. This utilised <span className="font-black text-emerald-400">{utilisationPercent}%</span> of the <span className="font-black">£75M cap</span>.
                                            </p>
                                            <div className="w-full bg-blue-900/50 h-2 rounded-full overflow-hidden text-white text-white">
                                                <div className="bg-emerald-400 h-full rounded-full transition-all duration-500" style={{ width: `${utilisationPercent}%` }}></div>
                                            </div>
                                        </div>
                                        <div className="mt-6 pt-6 border-t border-blue-800/50 flex justify-between items-center text-white text-white text-white text-white">
                                            <span className="text-[9px] font-black text-blue-300 uppercase tracking-widest text-blue-400">Status</span>
                                            <span className="text-[10px] font-black bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full uppercase border border-emerald-500/30 text-white">Fully Compliant</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Hub Graphs */}
                                <div className="lg:col-span-8 bg-white rounded-3xl border border-slate-200 p-8 shadow-sm flex flex-col text-slate-800 text-slate-800 text-slate-800">
                                    <div className="flex justify-between items-start mb-8 text-slate-800 text-slate-800 text-slate-800">
                                        <div>
                                            <h4 className="text-lg font-black text-slate-800 uppercase tracking-tight text-slate-800 text-slate-800 text-slate-800">{activeDay.day} Intraday Performance</h4>
                                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1 text-slate-400 text-slate-400 text-slate-400 text-slate-400">Comparison of Intraday Peak Exposure vs Final USM Settlement</p>
                                        </div>
                                        <div className="flex flex-col items-end text-slate-800 text-slate-800 text-slate-800">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400">Total Settled (3 Cycles)</p>
                                            <p className="text-xl font-black text-blue-700 tabular-nums text-blue-700 text-blue-700 text-blue-700">
                                                {formatCurrency(activeDay.total)}
                                            </p>
                                        </div>
                                    </div>

                                    <div className="h-[350px] mb-8 text-slate-800 text-slate-800 text-slate-800">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={activeDay.cycles} margin={{ top: 20, right: 10, left: 10, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 11, fontWeight: 'black'}} dy={10} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 10, fontWeight: 'bold'}} tickFormatter={(value) => `£${(value/1000000).toFixed(1)}M`} />
                                                <Tooltip 
                                                    contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1)'}}
                                                    formatter={(value, name) => [formatCurrency(value), name === 'peak' ? 'Intraday Peak' : 'Final Settlement']}
                                                />
                                                <Bar dataKey="peak" name="peak" radius={[8, 8, 0, 0]} barSize={40}>
                                                    {activeDay.cycles.map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={entry.peak > 4000000 ? '#1e3a8a' : '#3b82f6'} />
                                                    ))}
                                                </Bar>
                                                <Bar dataKey="settled" name="settled" fill="#10b981" radius={[8, 8, 0, 0]} barSize={20} />
                                                <ReferenceLine y={4000000} stroke="#cbd5e1" strokeDasharray="5 5" label={{ value: '£4M Monitor', position: 'insideTopLeft', fill: '#94a3b8', fontSize: 10, fontWeight: 'bold' }} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>

                                    <div className="grid grid-cols-3 gap-6 text-slate-800 text-slate-800">
                                        {activeDay.cycles.map((cycle, cIdx) => (
                                            <div key={cIdx} className="bg-slate-50 rounded-2xl p-4 border border-slate-100 flex flex-col gap-2 text-slate-800 text-slate-800">
                                                <div className="flex justify-between items-center text-slate-800 text-slate-800">
                                                    <span className="text-[10px] font-black text-[#002d72] uppercase tracking-tighter text-[#002d72]">{cycle.name} Metrics</span>
                                                    <div className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse text-slate-800 text-slate-800 text-slate-800"></div>
                                                </div>
                                                <div className="space-y-1 text-slate-800 text-slate-800 text-slate-800">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400">Settled Amount</p>
                                                    <p className="text-[13px] font-black text-slate-900 tabular-nums text-slate-900 text-slate-900">{formatCurrency(cycle.settled)}</p>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 pt-2 border-t border-slate-200/50 text-slate-800 text-slate-800">
                                                    <div className="text-slate-800 text-slate-800">
                                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400">Cycle Low</p>
                                                        <p className={`text-[10px] font-black ${cycle.low < 0 ? 'text-rose-500' : 'text-emerald-600'} text-rose-500`}>{formatCurrency(cycle.low)}</p>
                                                    </div>
                                                    <div className="text-right text-slate-800 text-slate-800 text-slate-800 text-slate-800">
                                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400 text-slate-400">Cycle Peak</p>
                                                        <p className="text-[10px] font-black text-blue-700 text-blue-700 text-blue-700">{formatCurrency(cycle.peak)}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Client Summary Cards */}
                        <div className="space-y-4 pb-8 w-full mt-6 text-slate-800 text-slate-800">
                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2 mb-2 uppercase tracking-wider text-slate-800 text-slate-800">
                                <Icon name="users" color="#f59e0b" size={20} /> Client Performance Breakdown
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-slate-800 text-slate-800">
                                {clientData.map((client, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-all group text-slate-800 text-slate-800 text-slate-800">
                                        <div className="p-5 border-b border-slate-50 relative text-slate-800 text-slate-800" style={{ backgroundColor: `${client.accent}08` }}>
                                            <div className="flex justify-between items-start text-slate-800 text-slate-800">
                                                <h4 className="text-lg font-black text-slate-900 tracking-tighter uppercase text-slate-900">{client.client}</h4>
                                                <div className={`h-1.5 w-1.5 rounded-full ${client.recsStatus === 'Reconciled' ? 'bg-emerald-500' : 'bg-amber-500 animate-pulse text-slate-800 text-slate-800 text-slate-800'}`}></div>
                                            </div>
                                            <div className="flex items-center justify-between mt-4 text-slate-800 text-slate-800">
                                                <div>
                                                    <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400 text-slate-400 text-slate-400 text-slate-400">Transactions</p>
                                                    <p className="text-sm font-black tabular-nums text-slate-800 text-slate-800 text-slate-800 text-slate-900">{client.totalTrans.toLocaleString()}</p>
                                                </div>
                                                <div className="text-right text-slate-800">
                                                    <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest text-slate-400 text-slate-400 text-slate-400 text-slate-400 text-slate-400">Total Value</p>
                                                    <p className={`text-sm font-black tabular-nums ${client.totalValue < 0 ? 'text-rose-500' : 'text-emerald-500'} text-slate-800 text-slate-800 text-slate-800`}>
                                                        {formatCurrency(client.totalValue)}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-5 space-y-2.5 flex-grow bg-white text-slate-800">
                                            {client.schemes.map((scheme, sIdx) => (
                                                <div key={sIdx} className="flex items-center justify-between p-1 rounded-lg hover:bg-slate-50 transition-colors text-[9px] text-slate-800 text-slate-800 text-slate-800">
                                                    <div className="flex items-center gap-1.5 font-bold text-slate-600 uppercase tracking-tighter text-slate-600 text-slate-600">
                                                        <div className="h-1 w-1 rounded-full shrink-0" style={{ backgroundColor: scheme.colour }}></div>
                                                        <span className="truncate max-w-[80px] text-slate-600">{scheme.name}</span>
                                                    </div>
                                                    <p className={`font-black tabular-nums shrink-0 ${scheme.value < 0 ? 'text-rose-500' : 'text-emerald-600'} text-slate-800 text-slate-800`}>
                                                        {formatCurrency(scheme.value)}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-4 bg-slate-50/80 border-t border-slate-100 min-h-[80px] flex items-center text-slate-500 text-slate-500 text-slate-500 text-slate-500 text-slate-500 text-slate-500 text-slate-500">
                                            <p className="text-[10px] text-slate-500 leading-relaxed font-semibold italic text-center w-full text-slate-500 text-slate-500 text-slate-500">
                                                "{client.commentary}"
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="w-full text-center pt-4 opacity-40 text-slate-400 text-slate-400 text-slate-400 text-slate-400 text-slate-400 text-slate-400">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic text-center underline">Goals for 2026: Scaling Safely & Automating Manual Touchpoints</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
